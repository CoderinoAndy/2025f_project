{# MVC: View #}
<!doctype html> <!-- Standard document shell for this page. -->
<!--
  Template: junk.html
  Purpose:
  - Mailbox list view dedicated to confirmed junk mail.
  - Shares sorting, search filtering, and bulk management behavior with other tabs.
  - Supplies tab-specific data attributes used by polling/action JavaScript.
  Expected context:
  - emails, sort, search_query, list_fingerprint, live_poll_interval_ms, current_list_url.
-->
<html lang="en">
  <head> <!-- Page metadata, title, and style links. -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Junk</title>

    <link
      href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}"
    />
<!-- Optional theme override (works once style.css has content) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>

  <!-- Live mailbox page root; data-* values feed the polling and action scripts. -->
  <body class="mailbox-list-page"
    data-live-email-view="junk"
    data-sort="{{ sort }}"
    data-page="{{ current_page }}"
    data-fingerprint="{{ list_fingerprint|default('') }}"
    data-poll-interval-ms="{{ live_poll_interval_ms }}"
    data-live-polling-enabled="{{ 1 if live_polling_enabled else 0 }}"
    data-search-query="{{ search_query }}"
  > <!-- Visible page content and interactive controls. -->
    {% include "_navbar.html" %} <!-- Reusable top navigation shared by mailbox pages. -->
    <div class="container-fluid app-main py-3 px-4"> <!-- Main page content area. -->
      <div class="list-header">
        {% if search_query %}
        <div class="d-flex align-items-center gap-2">
          <span class="muted">Results for "{{ search_query }}"</span>
          <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.junk') }}">Clear</a>
        </div>
        {% endif %}
        <form method="get" class="sort-form"> <!-- Form used for this action. -->
          {% if search_query %}
          <input type="hidden" name="q" value="{{ search_query }}">
          {% endif %}
          <label for="sort-junk" class="muted me-2 mb-0">Order</label>
          <select id="sort-junk" name="sort" class="form-select form-select-sm sort-select"
                  aria-label="Sort emails" onchange="this.form.submit()">
            <option value="date_desc" {% if sort == "date_desc" %}selected{% endif %}>Date sent (newest first)</option>
            <option value="date_asc" {% if sort == "date_asc" %}selected{% endif %}>Date sent (oldest first)</option>

            <option value="priority_desc" {% if sort == "priority_desc" %}selected{% endif %}>Priority (high to low)</option>
            <option value="priority_asc" {% if sort == "priority_asc" %}selected{% endif %}>Priority (low to high)</option>

            <option value="unread_first" {% if sort == "unread_first" %}selected{% endif %}>Unread first</option>
            <option value="read_first" {% if sort == "read_first" %}selected{% endif %}>Read first</option>
          </select>
        </form>
      </div>
      <div class="list-shell">
        {% include "_mailbox_list_content.html" %}
      </div>
      {% include "_bulk_selection_menu.html" %}
    </div>
    <!-- Floating quick action to open compose from any mailbox tab. -->
    <a class="compose-fab" href="{{ url_for('main.compose', next=current_list_url) }}" aria-label="Compose email">
      <i class="bi bi-pencil" aria-hidden="true"></i>
      <span>Compose</span>
    </a>
    <!-- Bootstrap JS for dropdowns, menus, and other interactive components. -->
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script> <!-- Page scripts. -->
    <!-- Selection mode logic: choose rows and trigger bulk actions. -->
    <script src="{{ url_for('static', filename='js/email-selection-menu.js') }}"></script>
    <!-- Polling logic: fetch latest rows and patch only when content changed. -->
    <script src="{{ url_for('static', filename='js/live-email-list.js') }}"></script>
    <!-- Row action logic: submit archive/delete/read toggles without full reload. -->
    <script src="{{ url_for('static', filename='js/mailbox-actions.js') }}"></script>
  </body>
</html>
