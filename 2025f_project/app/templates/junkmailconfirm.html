{# View template. #}
<!doctype html> <!-- Standard page shell. -->
<!--
  Page: junkmailconfirm.html
  What this does:
  - Mailbox list for uncertain junk that still needs user confirmation.
  - Preserves filter/sort state and defers row rendering to shared partials.
  - Emits route-specific live view metadata for polling + action scripts.
  This template expects:
  - emails, sort, search_query, list_fingerprint, live_poll_interval_ms, current_list_url.
-->
<html lang="en">
  <head> <!-- Head metadata, title, and styles. -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Junk Confirmation</title>

    <link
      href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}"
    />
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>

  <!-- Mailbox page root; the data-* values are used by the polling and action scripts. -->
  <body class="mailbox-list-page"
    data-live-email-view="junk-uncertain"
    data-sort="{{ sort }}"
    data-page="{{ current_page }}"
    data-fingerprint="{{ list_fingerprint|default('') }}"
    data-poll-interval-ms="{{ live_poll_interval_ms }}"
    data-live-polling-enabled="{{ 1 if live_polling_enabled else 0 }}"
    data-search-query="{{ search_query }}"
  > <!-- Main page content and controls. -->
    {% include "_navbar.html" %} <!-- Shared top nav for the mailbox pages. -->
    <div class="container-fluid app-main py-3 px-4"> <!-- Main content area. -->
      <div class="list-header">
        {% if search_query %}
        <div class="d-flex align-items-center gap-2">
          <span class="muted">Results for "{{ search_query }}"</span>
          <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.junkmailconfirm') }}">Clear</a>
        </div>
        {% endif %}
        <form method="get" class="sort-form"> <!-- Form for this action. -->
          {% if search_query %}
          <input type="hidden" name="q" value="{{ search_query }}">
          {% endif %}
          <label for="sort-junkconfirm" class="muted me-2 mb-0">Order</label>
          <select id="sort-junkconfirm" name="sort" class="form-select form-select-sm sort-select"
                  aria-label="Sort emails" onchange="this.form.submit()">
            <option value="date_desc" {% if sort == "date_desc" %}selected{% endif %}>Date sent (newest first)</option>
            <option value="date_asc" {% if sort == "date_asc" %}selected{% endif %}>Date sent (oldest first)</option>

            <option value="priority_desc" {% if sort == "priority_desc" %}selected{% endif %}>Priority (high to low)</option>
            <option value="priority_asc" {% if sort == "priority_asc" %}selected{% endif %}>Priority (low to high)</option>

            <option value="unread_first" {% if sort == "unread_first" %}selected{% endif %}>Unread first</option>
            <option value="read_first" {% if sort == "read_first" %}selected{% endif %}>Read first</option>
          </select>
        </form>
      </div>
      <div class="list-shell">
        {% include "_mailbox_list_content.html" %}
      </div>
      {% include "_bulk_selection_menu.html" %}
    </div>
    <!-- Floating shortcut to open compose from any mailbox tab. -->
    <a class="compose-fab" href="{{ url_for('main.compose', next=current_list_url) }}" aria-label="Compose email">
      <i class="bi bi-pencil" aria-hidden="true"></i>
      <span>Compose</span>
    </a>
    <!-- Bootstrap JS for dropdowns, menus, and the other interactive bits. -->
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script> <!-- Page-specific scripts. -->
    <!-- Selection-mode script for picking rows and running bulk actions. -->
    <script src="{{ url_for('static', filename='js/email-selection-menu.js') }}"></script>
    <!-- Polling script that refreshes rows only when something changed. -->
    <script src="{{ url_for('static', filename='js/live-email-list.js') }}"></script>
    <!-- Row-action script for archive, delete, and read updates without a full reload. -->
    <script src="{{ url_for('static', filename='js/mailbox-actions.js') }}"></script>
  </body>
</html>
