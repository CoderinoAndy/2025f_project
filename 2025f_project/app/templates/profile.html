<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>

    <link
      href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendor/bootstrap-icons/font/bootstrap-icons.min.css') }}"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
      .profile-shell{
        max-width: 880px;
      }
      .profile-card{
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
      }
      .profile-card .form-control,
      .profile-card .form-select{
        background: rgba(255,255,255,0.04);
        color: var(--text);
        border: 1px solid var(--border);
        color-scheme: dark;
      }
      .profile-card .form-control:focus,
      .profile-card .form-select:focus{
        color: var(--text);
        background: rgba(255,255,255,0.06);
      }
      .profile-card .form-select option{
        background: #221e2b;
        color: var(--text);
      }
      .profile-preview{
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.06);
      }
      .profile-empty{
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: var(--muted);
      }
      .profile-picture-label{
        margin-bottom: 14px;
      }
      .profile-preview-wrap{
        margin-bottom: 16px;
      }
      .file-picker-input{
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }
      .file-picker-label{
        margin: 0;
      }
    </style>
  </head>
  <body>
    {% include "_navbar.html" %}
    <div class="container app-main profile-shell py-4">
      <div class="profile-card">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
          <span class="muted">Used to personalize AI analysis and drafts</span>
        </div>

        <form method="post" enctype="multipart/form-data">
          <div class="row g-4 align-items-start">
            <div class="col-12 col-md-4">
              <label class="form-label profile-picture-label" for="profile-picture">Profile picture</label>
              <div class="profile-preview-wrap">
                {% if profile.photo_path %}
                <img
                  id="profile-preview-image"
                  class="profile-preview"
                  src="{{ url_for('static', filename=profile.photo_path) }}"
                  alt="Profile picture preview"
                >
                <div id="profile-preview-empty" class="profile-preview profile-empty d-none">
                  <i class="bi bi-person-fill"></i>
                </div>
                {% else %}
                <img
                  id="profile-preview-image"
                  class="profile-preview d-none"
                  src=""
                  alt="Profile picture preview"
                >
                <div id="profile-preview-empty" class="profile-preview profile-empty">
                  <i class="bi bi-person-fill"></i>
                </div>
                {% endif %}
              </div>
              <input class="file-picker-input" type="file" id="profile-picture" name="picture" accept="image/*">
              <label for="profile-picture" class="btn btn-outline-light btn-sm file-picker-label">
                <i class="bi bi-upload me-1" aria-hidden="true"></i> Choose file
              </label>
            </div>

            <div class="col-12 col-md-8">
              <div class="mb-3">
                <label class="form-label" for="profile-name">Name</label>
                <input
                  class="form-control"
                  id="profile-name"
                  name="name"
                  type="text"
                  maxlength="120"
                  value="{{ profile.name or '' }}"
                  placeholder="Enter your name"
                >
              </div>

              <div class="mb-4">
                <label class="form-label" for="profile-occupation">Occupation</label>
                <select class="form-select" id="profile-occupation" name="occupation">
                  <option value="">Select occupation</option>
                  {% for option in occupation_options %}
                  <option value="{{ option }}" {% if profile.occupation == option %}selected{% endif %}>
                    {{ option }}
                  </option>
                  {% endfor %}
                </select>
              </div>

              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check2 me-1"></i> Save Profile
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <script>
      (() => {
        const fileInput = document.getElementById("profile-picture");
        const previewImage = document.getElementById("profile-preview-image");
        const previewEmpty = document.getElementById("profile-preview-empty");
        if (!fileInput || !previewImage || !previewEmpty) {
          return;
        }

        let previewUrl = null;
        const clearPreviewUrl = () => {
          if (previewUrl) {
            URL.revokeObjectURL(previewUrl);
            previewUrl = null;
          }
        };

        fileInput.addEventListener("change", () => {
          const file = (fileInput.files || [])[0];
          if (!file || !file.type || !file.type.startsWith("image/")) {
            return;
          }

          clearPreviewUrl();
          previewUrl = URL.createObjectURL(file);
          previewImage.src = previewUrl;
          previewImage.classList.remove("d-none");
          previewEmpty.classList.add("d-none");
        });

        window.addEventListener("beforeunload", clearPreviewUrl);
      })();
    </script>
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
  </body>
</html>
